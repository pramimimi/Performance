<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Quintype Performance Analyzer - PDF Export</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .milk-button {
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            color: #ffffff;
            border: none;
            transition: all 0.3s ease;
        }
        .milk-button:hover {
            background: linear-gradient(135deg, #1e40af, #2563eb);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.4);
        }
        .glass {
            background: rgba(30, 58, 138, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 58, 138, 0.3);
        }
        .progress-bar {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            height: 100%;
            border-radius: 9999px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-navy-900">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold text-white mb-4 flex items-center justify-center gap-3">
                <span class="text-6xl">⚡</span>
                Performance Analyzer
            </h1>
            <p class="text-blue-100 text-xl">AI-powered website performance analysis with PDF export</p>
        </header>

        <!-- Main Analysis Section -->
        <section class="glass p-8 rounded-2xl mb-8">
            <div class="text-center mb-8">
                <h2 class="text-4xl font-bold text-white mb-2">🚀 Performance Analysis</h2>
                <p class="text-blue-100 text-lg">Enter any website URL to get comprehensive performance insights</p>
            </div>
            
            <!-- URL Input -->
            <div class="max-w-2xl mx-auto mb-8">
                <div class="flex gap-4">
                    <input 
                        type="url" 
                        id="urlInput" 
                        placeholder="Enter website URL (e.g., https://example.com)" 
                        class="flex-1 px-6 py-4 rounded-xl bg-white/10 border border-white/20 text-white placeholder-blue-100 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
                    >
                    <button 
                        id="analyzeBtn" 
                        onclick="analyzePerformance()" 
                        class="milk-button px-8 py-4 rounded-xl font-semibold text-lg hover:scale-105 transition-transform"
                    >
                        Analyze Performance
                    </button>
                </div>
            </div>

            <!-- Progress Bar -->
            <div id="progressContainer" class="hidden max-w-2xl mx-auto mb-8">
                <div class="bg-white/10 rounded-full h-3 overflow-hidden">
                    <div id="progressBar" class="progress-bar w-0"></div>
                </div>
                <p id="progressText" class="text-center text-blue-100 mt-2">Starting analysis...</p>
            </div>

            <!-- Results -->
            <div id="result" class="hidden">
                <!-- Results will be populated here -->
            </div>
        </section>
    </div>

    <script>
        let currentAnalysisData = null;
        let isAnalyzing = false;

        // Analyze performance function
        async function analyzePerformance() {
            const url = document.getElementById('urlInput').value.trim();
            const analyzeBtn = document.getElementById('analyzeBtn');
            const result = document.getElementById('result');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');

            if (!url) {
                alert('Please enter a website URL');
                return;
            }

            if (isAnalyzing) return;

            isAnalyzing = true;
            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '⏳ Analyzing...';
            result.classList.add('hidden');
            progressContainer.classList.remove('hidden');

            // Simulate progress
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                progressBar.style.width = progress + '%';
                progressText.textContent = `Analyzing performance... ${Math.round(progress)}%`;
            }, 200);

            try {
                console.log('Making API call to:', 'http://localhost:3000/analyze');
                
                const response = await fetch('http://localhost:3000/analyze', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });
                
                console.log('Response received:', response.status);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Analysis data received:', data);
                
                // Store analysis data for PDF export
                currentAnalysisData = data;
                console.log('Analysis data stored for PDF export:', currentAnalysisData);
                
                // Complete progress
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                progressText.textContent = 'Analysis complete!';
                
                setTimeout(() => {
                    progressContainer.classList.add('hidden');
                    displayResults(data);
                }, 500);
                
            } catch (error) {
                console.error('Analysis error:', error);
                clearInterval(progressInterval);
                progressContainer.classList.add('hidden');
                
                const msg = document.createElement('div');
                msg.className = 'text-red-400 text-center p-4 bg-red-900/20 rounded-xl';
                
                if (error.message.includes('Failed to fetch') || error.message.includes('CORS')) {
                    msg.textContent = '❌ Connection Error! Please start a web server.';
                    alert('❌ Connection Error!\n\nPlease make sure:\n1. The backend server is running on port 3000\n2. You are accessing the frontend through a web server (not file://)\n\nTo fix this, run: python -m http.server 8000 in the frontend folder\nThen open: http://localhost:8000/SEO-new-PDF.html');
                } else {
                    msg.textContent = `❌ Analysis failed: ${error.message}`;
                }
                
                result.innerHTML = '';
                result.appendChild(msg);
                result.classList.remove('hidden');
            } finally {
                isAnalyzing = false;
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = 'Analyze Performance';
            }
        }

        // Display results
        function displayResults(data) {
            const result = document.getElementById('result');
            result.classList.remove('hidden');
            console.log('Hidden class removed from result element');
            
            // Handle new API structure with proper fallbacks
            const performance = {
                overallScore: data.overallScore || 0,
                lcp: data.coreWebVitals?.lcp || 0,
                cls: data.coreWebVitals?.cls || 0,
                fcp: data.coreWebVitals?.fcp || 0,
                tti: data.coreWebVitals?.tti || 0,
                tbt: data.coreWebVitals?.tbt || 0,
                speedIndex: data.coreWebVitals?.speedIndex || 0,
                fid: data.coreWebVitals?.fid || 0,
                inp: data.coreWebVitals?.inp || 0,
                issues: data.performanceCategories?.performanceIssues?.issues || [],
                coreWebVitals: {
                    lcp: getVitalStatusFromValue(data.coreWebVitals?.lcp, 'lcp').status,
                    cls: getVitalStatusFromValue(data.coreWebVitals?.cls, 'cls').status,
                    fcp: getVitalStatusFromValue(data.coreWebVitals?.fcp, 'fcp').status,
                    fid: getVitalStatusFromValue(data.coreWebVitals?.fid, 'fid').status,
                    inp: getVitalStatusFromValue(data.coreWebVitals?.inp, 'inp').status
                }
            };
            
            result.innerHTML = `
                <!-- Overall Performance Score -->
                <div class="text-center mb-8">
                    <div class="text-6xl font-bold text-white mb-2">${performance.overallScore}%</div>
                    <div class="text-blue-100 text-xl mb-4">Overall Performance Score</div>
                    <button onclick="downloadPDFReport()" class="bg-blue-800 hover:bg-blue-700 text-white px-6 py-3 rounded-lg flex items-center gap-2 transition-colors mx-auto">
                        📄 Download PDF Report
                    </button>
                </div>

                <!-- Core Web Vitals -->
                <div class="glass p-8 rounded-2xl mb-8">
                    <h3 class="text-3xl font-bold text-white mb-6 flex items-center gap-2">
                        📊 Core Web Vitals
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                        <!-- LCP -->
                        <div class="bg-white/5 p-6 rounded-xl">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-blue-100 font-semibold">LCP</span>
                                <span class="text-white font-bold">${performance.lcp}ms</span>
                            </div>
                            <div class="text-sm text-gray-300 mb-2">Largest Contentful Paint</div>
                            <div class="text-xs ${getVitalStatusFromValue(performance.lcp, 'lcp').class}">
                                ${performance.coreWebVitals.lcp.toUpperCase()}
                            </div>
                        </div>

                        <!-- CLS -->
                        <div class="bg-white/5 p-6 rounded-xl">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-blue-100 font-semibold">CLS</span>
                                <span class="text-white font-bold">${performance.cls}</span>
                            </div>
                            <div class="text-sm text-gray-300 mb-2">Cumulative Layout Shift</div>
                            <div class="text-xs ${getVitalStatusFromValue(performance.cls, 'cls').class}">
                                ${performance.coreWebVitals.cls.toUpperCase()}
                            </div>
                        </div>

                        <!-- FCP -->
                        <div class="bg-white/5 p-6 rounded-xl">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-blue-100 font-semibold">FCP</span>
                                <span class="text-white font-bold">${performance.fcp}ms</span>
                            </div>
                            <div class="text-sm text-gray-300 mb-2">First Contentful Paint</div>
                            <div class="text-xs ${getVitalStatusFromValue(performance.fcp, 'fcp').class}">
                                ${performance.coreWebVitals.fcp.toUpperCase()}
                            </div>
                        </div>

                        <!-- TTI -->
                        <div class="bg-white/5 p-6 rounded-xl">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-blue-100 font-semibold">TTI</span>
                                <span class="text-white font-bold">${performance.tti}ms</span>
                            </div>
                            <div class="text-sm text-gray-300 mb-2">Time to Interactive</div>
                            <div class="text-xs ${getVitalStatusFromValue(performance.tti, 'tti').class}">
                                ${getVitalStatusFromValue(performance.tti, 'tti').status.toUpperCase()}
                            </div>
                        </div>

                        <!-- TBT -->
                        <div class="bg-white/5 p-6 rounded-xl">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-blue-100 font-semibold">TBT</span>
                                <span class="text-white font-bold">${performance.tbt}ms</span>
                            </div>
                            <div class="text-sm text-gray-300 mb-2">Total Blocking Time</div>
                            <div class="text-xs ${getVitalStatusFromValue(performance.tbt, 'tbt').class}">
                                ${getVitalStatusFromValue(performance.tbt, 'tbt').status.toUpperCase()}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Analysis Info -->
                <div class="glass p-6 rounded-2xl">
                    <div class="text-center mb-4">
                        <h3 class="text-2xl font-bold text-white mb-2">📈 Analysis Details</h3>
                    </div>
                    <div class="analysis-content">
                        <p><strong>Overall Score:</strong> ${performance.overallScore}% | <strong>Data Source:</strong> ${data.dataSource || 'PageSpeed API'} | <strong>Analysis Time:</strong> ${data.analysisTime || 0}ms</p>
                    </div>
                </div>
            `;
        }

        // Get vital status from value
        function getVitalStatusFromValue(value, metric) {
            if (!value && value !== 0) return { status: 'unknown', class: 'text-gray-400' };
            
            switch (metric) {
                case 'lcp':
                    if (value <= 2500) return { status: 'good', class: 'text-green-400' };
                    if (value <= 4000) return { status: 'needs-improvement', class: 'text-yellow-400' };
                    return { status: 'poor', class: 'text-red-400' };
                
                case 'cls':
                    if (value <= 0.1) return { status: 'good', class: 'text-green-400' };
                    if (value <= 0.25) return { status: 'needs-improvement', class: 'text-yellow-400' };
                    return { status: 'poor', class: 'text-red-400' };
                
                case 'fcp':
                    if (value <= 1800) return { status: 'good', class: 'text-green-400' };
                    if (value <= 3000) return { status: 'needs-improvement', class: 'text-yellow-400' };
                    return { status: 'poor', class: 'text-red-400' };
                
                case 'fid':
                    if (value <= 100) return { status: 'good', class: 'text-green-400' };
                    if (value <= 300) return { status: 'needs-improvement', class: 'text-yellow-400' };
                    return { status: 'poor', class: 'text-red-400' };
                
                case 'inp':
                    if (value <= 200) return { status: 'good', class: 'text-green-400' };
                    if (value <= 500) return { status: 'needs-improvement', class: 'text-yellow-400' };
                    return { status: 'poor', class: 'text-red-400' };
                
                case 'tti':
                    if (value <= 5000) return { status: 'good', class: 'text-green-400' };
                    if (value <= 10000) return { status: 'needs-improvement', class: 'text-yellow-400' };
                    return { status: 'poor', class: 'text-red-400' };
                
                case 'tbt':
                    if (value <= 200) return { status: 'good', class: 'text-green-400' };
                    if (value <= 600) return { status: 'needs-improvement', class: 'text-yellow-400' };
                    return { status: 'poor', class: 'text-red-400' };
                
                default:
                    return { status: 'unknown', class: 'text-gray-400' };
            }
        }

        // Download PDF Report
        async function downloadPDFReport() {
            console.log('PDF download clicked, currentAnalysisData:', currentAnalysisData);
            
            if (!currentAnalysisData) {
                alert('No performance data available to download. Please analyze a website first.');
                return;
            }

            try {
                // Show loading state
                const button = event.target;
                const originalText = button.innerHTML;
                button.innerHTML = '⏳ Generating PDF...';
                button.disabled = true;

                // Extract comprehensive data for PDF generation including custom code analysis
                const comprehensiveData = {
                    url: currentAnalysisData.url,
                    performance: currentAnalysisData.performance,
                    coreWebVitals: currentAnalysisData.coreWebVitals,
                    dataSource: currentAnalysisData.dataSource,
                    timestamp: currentAnalysisData.timestamp,
                    customCodeAnalysis: currentAnalysisData.customCodeAnalysis || {},
                    publisherCode: currentAnalysisData.publisherCode || {},
                    thirdPartyCode: currentAnalysisData.thirdPartyCode || {},
                    highPriorityIssues: currentAnalysisData.highPriorityIssues || {}
                };

                console.log('Sending comprehensive data to PDF endpoint:', comprehensiveData);

                // Send comprehensive data to backend for PDF generation
                const response = await fetch('http://localhost:3000/export-pdf', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ analysisData: comprehensiveData })
                });

                console.log('PDF response status:', response.status);
                console.log('PDF response headers:', response.headers);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('PDF response error:', errorText);
                    throw new Error(`Failed to generate PDF report: ${response.status} - ${errorText}`);
                }

                // Get the HTML content
                const pdfHtml = await response.text();
                console.log('PDF HTML received, length:', pdfHtml.length);
                
                // Open in new window for printing/saving as PDF
                const printWindow = window.open('', '_blank');
                if (!printWindow) {
                    throw new Error('Popup blocked. Please allow popups for this site.');
                }
                
                printWindow.document.write(pdfHtml);
                printWindow.document.close();
                
                // Focus the window for printing
                printWindow.focus();
                
                // Reset button state
                button.innerHTML = originalText;
                button.disabled = false;
                
            } catch (error) {
                console.error('PDF generation error:', error);
                alert(`Failed to generate PDF report: ${error.message}`);
                
                // Reset button state
                const button = event.target;
                button.innerHTML = '📄 Download PDF Report';
                button.disabled = false;
            }
        }

        // Allow Enter key to trigger analysis
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzePerformance();
            }
        });
    </script>
</body>
</html>

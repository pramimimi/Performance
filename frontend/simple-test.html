<!DOCTYPE html>
<html>
<head>
    <title>Simple Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <h1 class="text-3xl mb-4">Simple Test</h1>
    <input type="text" id="urlInput" value="https://example.com" class="p-2 bg-gray-700 rounded mb-4">
    <button onclick="testAnalyze()" class="bg-blue-600 px-4 py-2 rounded">Test Analyze</button>
    <div id="result" class="mt-4"></div>

    <script>
        async function testAnalyze() {
            const url = document.getElementById('urlInput').value;
            const result = document.getElementById('result');
            
            try {
                result.innerHTML = 'Testing...';
                const response = await fetch('http://localhost:3000/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                result.innerHTML = `
                    <div class="text-green-400">✅ Success!</div>
                    <div>SEO Score: ${data.seo.score}</div>
                    <div>Performance: ${data.performance.overallScore}</div>
                    <div>Crawlability: ${data.crawl.score}</div>
                    <div>Issues: ${data.seo.issues.length}</div>
                `;
            } catch (error) {
                result.innerHTML = `<div class="text-red-400">❌ Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>

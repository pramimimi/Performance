<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 SEO Solution - Quintype Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .milk-button {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #1f2937;
            border: none;
            transition: all 0.3s ease;
        }
        .milk-button:hover {
            background: linear-gradient(135deg, #fde68a, #fcd34d);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .ai-glow {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }
        .progress-bar {
            background: linear-gradient(90deg, #ef4444, #f97316, #22c55e);
            height: 8px;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .code-block {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .accordion-content.open {
            max-height: 500px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-800 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <div class="flex items-center justify-center mb-4">
                <svg class="w-12 h-12 mr-4 text-blue-400" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3z"/>
                </svg>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-white bg-clip-text text-transparent">
                    🔧 AI Solution Center
                </h1>
            </div>
        </header>

        <!-- Navigation -->
        <div class="flex justify-between items-center mb-6">
            <button onclick="goBack()" class="milk-button px-6 py-3 rounded-xl font-semibold flex items-center gap-2">
                ← Back to Report
            </button>
            <div class="text-blue-200 text-sm">
                Powered by AI • Real-time Analysis
            </div>
        </div>

        <!-- Main Content -->
        <div id="solutionContent">
            <!-- Content will be populated by JavaScript -->
        </div>

        <!-- FAQ Section -->
        <div class="mt-12 glass p-8 rounded-2xl">
            <h3 class="text-2xl font-bold text-white mb-6">❓ Frequently Asked Questions</h3>
            <div class="space-y-4">
                <div class="faq-item">
                    <button class="faq-question w-full text-left p-4 bg-white/5 rounded-lg hover:bg-white/10 transition-colors flex justify-between items-center">
                        <span class="text-white font-semibold">What is this metric and why does it matter?</span>
                        <span class="text-blue-400">+</span>
                    </button>
                    <div class="accordion-content">
                        <div class="p-4 text-blue-200">
                            <p id="faq-explanation">Loading...</p>
                        </div>
                    </div>
                </div>
                <div class="faq-item">
                    <button class="faq-question w-full text-left p-4 bg-white/5 rounded-lg hover:bg-white/10 transition-colors flex justify-between items-center">
                        <span class="text-white font-semibold">How will this fix improve my website?</span>
                        <span class="text-blue-400">+</span>
                    </button>
                    <div class="accordion-content">
                        <div class="p-4 text-blue-200">
                            <p id="faq-impact">Loading...</p>
                        </div>
                    </div>
                </div>
                <div class="faq-item">
                    <button class="faq-question w-full text-left p-4 bg-white/5 rounded-lg hover:bg-white/10 transition-colors flex justify-between items-center">
                        <span class="text-white font-semibold">What are the best practices for this issue?</span>
                        <span class="text-blue-400">+</span>
                    </button>
                    <div class="accordion-content">
                        <div class="p-4 text-blue-200">
                            <p id="faq-best-practices">Loading...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentIssueData = null;

        // Initialize page
        window.addEventListener('load', function() {
            loadIssueData();
            setupAccordions();
        });

        function loadIssueData() {
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category');
            const issueKey = urlParams.get('issueKey');
            const index = urlParams.get('index');
            const dataParam = urlParams.get('data');
            
            if (dataParam) {
                currentIssueData = JSON.parse(decodeURIComponent(dataParam));
            }
            
            if (currentIssueData) {
                displaySolution(category, issueKey, currentIssueData);
            } else {
                document.getElementById('solutionContent').innerHTML = `
                    <div class="glass p-8 rounded-2xl text-center">
                        <h2 class="text-2xl font-bold text-white mb-4">⚠️ Issue Data Not Found</h2>
                        <p class="text-blue-200">Please go back to the main report and click on an issue to view its solution.</p>
                        <button onclick="goBack()" class="milk-button px-6 py-3 rounded-xl font-semibold mt-4">
                            Back to Report
                        </button>
                    </div>
                `;
            }
        }

        function displaySolution(category, issueKey, issueData) {
            const severity = getSeverityLevel(issueData.severity || 'medium');
            const categoryInfo = getCategoryInfo(category, issueKey);
            
            document.getElementById('solutionContent').innerHTML = `
                <!-- Header Section -->
                <div class="glass p-8 rounded-2xl mb-6 ai-glow">
                    <div class="flex items-start justify-between mb-6">
                        <div class="flex-1">
                            <div class="flex items-center gap-4 mb-4">
                                <span class="px-4 py-2 rounded-full text-sm font-semibold ${severity.class}">
                                    ${severity.icon} ${severity.label}
                                </span>
                                <span class="px-3 py-1 rounded text-sm bg-blue-500/20 text-blue-300">${categoryInfo.category}</span>
                                <span class="px-3 py-1 rounded text-sm bg-blue-600/20 text-blue-400">${categoryInfo.subCategory}</span>
                            </div>
                            <h2 class="text-3xl font-bold text-white mb-4">${issueData.message}</h2>
                            <p class="text-blue-200 text-lg">${issueData.explanation || issueData.impact}</p>
                        </div>
                    </div>
                    
                    <!-- Progress Bar -->
                    <div class="mb-4">
                        <div class="flex justify-between text-sm text-blue-300 mb-2">
                            <span>Fixing Potential Impact</span>
                            <span>${getImpactPercentage(issueKey)}</span>
                        </div>
                        <div class="w-full bg-gray-700 rounded-full h-2">
                            <div class="progress-bar" style="width: ${getImpactPercentage(issueKey)}"></div>
                        </div>
                    </div>
                </div>

                <!-- Issue Explanation -->
                <div class="glass p-8 rounded-2xl mb-6">
                    <h3 class="text-2xl font-bold text-white mb-4 flex items-center gap-2">
                        🔍 Issue Analysis
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <h4 class="text-lg font-semibold text-blue-300 mb-2">What is this warning?</h4>
                            <p class="text-blue-200">${getIssueExplanation(issueKey, category)}</p>
                        </div>
                        <div>
                            <h4 class="text-lg font-semibold text-blue-300 mb-2">Why did this happen?</h4>
                            <p class="text-blue-200">${getCauseAnalysis(issueKey, category)}</p>
                        </div>
                        <div>
                            <h4 class="text-lg font-semibold text-blue-300 mb-2">Impact on your website</h4>
                            <p class="text-blue-200">${getImpactAnalysis(issueKey, category)}</p>
                        </div>
                    </div>
                </div>

                <!-- Solution Section -->
                <div class="glass p-8 rounded-2xl mb-6">
                    <h3 class="text-2xl font-bold text-white mb-6 flex items-center gap-2">
                        🛠️ Solution & Fix
                    </h3>
                    
                    <div class="space-y-6">
                        <!-- Steps to Fix -->
                        <div>
                            <h4 class="text-lg font-semibold text-blue-300 mb-3">📋 Steps to Fix</h4>
                            <div class="bg-white/5 p-4 rounded-lg">
                                <ol class="list-decimal list-inside space-y-2 text-blue-200">
                                    ${getSolutionSteps(issueKey, category).map(step => `<li>${step}</li>`).join('')}
                                </ol>
                            </div>
                        </div>

                        <!-- Custom Script Fix -->
                        <div>
                            <h4 class="text-lg font-semibold text-blue-300 mb-3">💻 Custom Script Fix</h4>
                            <div class="code-block p-4">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-green-400 text-sm">Ready-to-use code</span>
                                    <button onclick="copyCode()" class="text-blue-400 text-sm hover:text-blue-300">Copy Code</button>
                                </div>
                                <pre class="text-green-300 text-sm overflow-x-auto"><code id="codeBlock">${getCustomCode(issueKey, category)}</code></pre>
                            </div>
                        </div>

                        <!-- Best Practice Tip -->
                        <div>
                            <h4 class="text-lg font-semibold text-blue-300 mb-3">💡 Best Practice Tip</h4>
                            <div class="bg-gradient-to-r from-blue-500/10 to-purple-500/10 p-4 rounded-lg border border-blue-500/20">
                                <p class="text-blue-200">${getBestPracticeTip(issueKey, category)}</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="glass p-8 rounded-2xl">
                    <h3 class="text-2xl font-bold text-white mb-6">🚀 Take Action</h3>
                    <div class="flex flex-wrap gap-4">
                        <button class="milk-button px-6 py-3 rounded-xl font-semibold flex items-center gap-2">
                            🎯 Apply Fix
                        </button>
                        <button class="milk-button px-6 py-3 rounded-xl font-semibold flex items-center gap-2">
                            🤖 Generate Custom Code
                        </button>
                        <a href="${getDocumentationLink(issueKey, category)}" target="_blank" 
                           class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold flex items-center gap-2 transition-colors">
                            📚 View Documentation
                        </a>
                    </div>
                </div>
            `;

            // Update FAQ content
            updateFAQContent(issueKey, category);
        }

        function getSeverityLevel(severity) {
            switch(severity) {
                case 'critical':
                case 'high':
                    return {icon: '🔴', label: 'HIGH', class: 'bg-red-500 text-white'};
                case 'medium':
                case 'warning':
                    return {icon: '🟠', label: 'MEDIUM', class: 'bg-orange-500 text-white'};
                case 'low':
                default:
                    return {icon: '🟢', label: 'LOW', class: 'bg-green-500 text-white'};
            }
        }

        function getCategoryInfo(category, issueKey) {
            const categories = {
                'seo': {
                    'title_too_short': {category: 'SEO', subCategory: 'Metadata'},
                    'title_too_long': {category: 'SEO', subCategory: 'Metadata'},
                    'missing_meta_description': {category: 'SEO', subCategory: 'Metadata'},
                    'missing_canonical': {category: 'SEO', subCategory: 'Canonical'},
                    'incomplete_open_graph': {category: 'SEO', subCategory: 'Schema'},
                    'missing_structured_data': {category: 'SEO', subCategory: 'Schema'},
                    'missing_h1': {category: 'SEO', subCategory: 'Metadata'},
                    'multiple_h1': {category: 'SEO', subCategory: 'Metadata'}
                },
                'performance': {
                    'lcp': {category: 'Performance', subCategory: 'LCP'},
                    'cls': {category: 'Performance', subCategory: 'CLS'},
                    'fcp': {category: 'Performance', subCategory: 'FCP'},
                    'tti': {category: 'Performance', subCategory: 'TTI'},
                    'tbt': {category: 'Performance', subCategory: 'TBT'}
                },
                'crawlability': {
                    'sitemap': {category: 'Crawlability', subCategory: 'Robots.txt'},
                    'robots': {category: 'Crawlability', subCategory: 'Robots.txt'},
                    'https': {category: 'Crawlability', subCategory: 'HTTPS'},
                    'broken_links': {category: 'Crawlability', subCategory: 'Links'},
                    'redirect_chains': {category: 'Crawlability', subCategory: 'Redirects'}
                }
            };
            return categories[category]?.[issueKey] || {category: category, subCategory: 'General'};
        }

        function getImpactPercentage(issueKey) {
            const percentages = {
                'lcp': '75%',
                'cls': '60%',
                'fcp': '70%',
                'tti': '50%',
                'tbt': '45%',
                'title_too_short': '80%',
                'missing_meta_description': '85%',
                'missing_structured_data': '90%',
                'sitemap': '70%',
                'https': '95%'
            };
            return percentages[issueKey] || '60%';
        }

        function getIssueExplanation(issueKey, category) {
            const explanations = {
                'lcp': 'Largest Contentful Paint (LCP) measures loading performance by tracking when the largest content element becomes visible.',
                'cls': 'Cumulative Layout Shift (CLS) measures visual stability by tracking unexpected layout movements during page load.',
                'fcp': 'First Contentful Paint (FCP) measures how quickly the first content appears on the page.',
                'title_too_short': 'Page titles that are too short may not effectively communicate the page content to search engines and users.',
                'missing_meta_description': 'Meta descriptions provide a summary of page content in search results and influence click-through rates.',
                'sitemap': 'XML sitemaps help search engines discover and index all pages on your website efficiently.'
            };
            return explanations[issueKey] || 'This issue affects your website\'s performance and search engine optimization.';
        }

        function getCauseAnalysis(issueKey, category) {
            const causes = {
                'lcp': 'Large images, slow server response times, or render-blocking resources delay the largest content element from loading.',
                'cls': 'Images without dimensions, dynamically inserted content, or web fonts cause layout shifts during page load.',
                'fcp': 'Heavy CSS, blocking JavaScript, or slow server response times delay the first content from appearing.',
                'title_too_short': 'The page title tag contains fewer than 30 characters, which may not provide enough context for search engines.',
                'missing_meta_description': 'The page lacks a meta description tag, which is used by search engines in search result snippets.',
                'sitemap': 'No XML sitemap is found at the standard location (/sitemap.xml), making it harder for search engines to discover pages.'
            };
            return causes[issueKey] || 'This issue typically occurs due to technical configuration or content optimization needs.';
        }

        function getImpactAnalysis(issueKey, category) {
            const impacts = {
                'lcp': 'Poor LCP scores negatively affect user experience and search rankings, as users expect fast-loading pages.',
                'cls': 'High CLS creates a poor user experience with content jumping around, leading to higher bounce rates.',
                'fcp': 'Slow FCP delays content visibility, affecting user engagement and search engine rankings.',
                'title_too_short': 'Short titles may result in lower click-through rates from search results and reduced search visibility.',
                'missing_meta_description': 'Missing meta descriptions reduce the likelihood of users clicking on your page in search results.',
                'sitemap': 'Without a sitemap, search engines may not discover all your pages, leading to incomplete indexing.'
            };
            return impacts[issueKey] || 'This issue can impact your website\'s search engine rankings and user experience.';
        }

        function getSolutionSteps(issueKey, category) {
            const steps = {
                'lcp': [
                    'Optimize images by compressing and using modern formats (WebP, AVIF)',
                    'Implement lazy loading for below-the-fold images',
                    'Use a Content Delivery Network (CDN) for faster delivery',
                    'Preload critical resources like hero images',
                    'Minimize server response time and optimize database queries'
                ],
                'cls': [
                    'Set explicit width and height attributes for all images and videos',
                    'Reserve space for dynamically inserted content',
                    'Use font-display: swap for web fonts to prevent layout shifts',
                    'Avoid inserting content above existing content without reserving space',
                    'Test layout stability with tools like Chrome DevTools'
                ],
                'title_too_short': [
                    'Expand the title to 50-60 characters for optimal length',
                    'Include relevant keywords that describe the page content',
                    'Make the title compelling and click-worthy',
                    'Ensure each page has a unique, descriptive title',
                    'Test title length with SEO tools to verify optimal character count'
                ],
                'missing_meta_description': [
                    'Write a compelling meta description of 150-160 characters',
                    'Include a call-to-action to encourage clicks',
                    'Use relevant keywords naturally in the description',
                    'Make each meta description unique for every page',
                    'Test the description in search result previews'
                ]
            };
            return steps[issueKey] || [
                'Identify the root cause of the issue',
                'Implement the recommended solution',
                'Test the fix to ensure it works correctly',
                'Monitor the results and make adjustments if needed'
            ];
        }

        function getCustomCode(issueKey, category) {
            const codes = {
                'lcp': `<!-- Optimize LCP -->
<link rel="preload" href="/hero-image.jpg" as="image">
<img src="/hero-image.jpg" 
     width="800" 
     height="600" 
     alt="Hero image" 
     loading="eager"
     fetchpriority="high">

<!-- CSS for image optimization -->
<style>
img {
  max-width: 100%;
  height: auto;
}
</style>`,
                'cls': `<!-- Prevent CLS -->
<style>
/* Reserve space for images */
img, video {
  width: auto;
  height: auto;
  max-width: 100%;
}

/* Font loading optimization */
@font-face {
  font-family: 'YourFont';
  src: url('font.woff2') format('woff2');
  font-display: swap;
}
</style>`,
                'title_too_short': `<!-- SEO-optimized title -->
<title>Complete Guide to Digital Marketing Strategies 2024 | Your Brand</title>

<!-- Enhanced with Open Graph -->
<meta property="og:title" content="Complete Guide to Digital Marketing Strategies 2024">
<meta name="twitter:title" content="Complete Guide to Digital Marketing Strategies 2024">`,
                'missing_meta_description': `<!-- Compelling meta description -->
<meta name="description" content="Discover proven digital marketing strategies for 2024. Learn SEO, social media, and content marketing tactics to grow your business. Get expert tips and actionable insights.">

<!-- Enhanced with Open Graph -->
<meta property="og:description" content="Discover proven digital marketing strategies for 2024. Learn SEO, social media, and content marketing tactics to grow your business.">`
            };
            return codes[issueKey] || `<!-- Custom solution code for ${issueKey} -->
<!-- Add your implementation here -->`;
        }

        function getBestPracticeTip(issueKey, category) {
            const tips = {
                'lcp': 'Always prioritize above-the-fold content loading. Use resource hints like preload for critical resources and consider implementing critical CSS inlining.',
                'cls': 'Design with layout stability in mind from the start. Always specify dimensions for media elements and test your pages on different devices.',
                'title_too_short': 'Write titles that are both SEO-friendly and user-friendly. Include your brand name and make them compelling enough to click.',
                'missing_meta_description': 'Think of meta descriptions as ad copy for your search results. Make them compelling, informative, and include a clear call-to-action.',
                'sitemap': 'Keep your sitemap updated and submit it to Google Search Console. Include only canonical URLs and prioritize important pages.'
            };
            return tips[issueKey] || 'Follow industry best practices and regularly monitor your website\'s performance to maintain optimal SEO and user experience.';
        }

        function getDocumentationLink(issueKey, category) {
            const links = {
                'lcp': 'https://web.dev/lcp/',
                'cls': 'https://web.dev/cls/',
                'fcp': 'https://web.dev/fcp/',
                'title_too_short': 'https://developers.google.com/search/docs/appearance/title-link',
                'missing_meta_description': 'https://developers.google.com/search/docs/appearance/snippet',
                'sitemap': 'https://developers.google.com/search/docs/crawling-indexing/sitemaps/overview'
            };
            return links[issueKey] || 'https://developers.google.com/search/docs';
        }

        function updateFAQContent(issueKey, category) {
            document.getElementById('faq-explanation').textContent = getIssueExplanation(issueKey, category);
            document.getElementById('faq-impact').textContent = getImpactAnalysis(issueKey, category);
            document.getElementById('faq-best-practices').textContent = getBestPracticeTip(issueKey, category);
        }

        function setupAccordions() {
            document.querySelectorAll('.faq-question').forEach(question => {
                question.addEventListener('click', function() {
                    const content = this.nextElementSibling;
                    const icon = this.querySelector('span:last-child');
                    
                    if (content.classList.contains('open')) {
                        content.classList.remove('open');
                        icon.textContent = '+';
                    } else {
                        // Close all other accordions
                        document.querySelectorAll('.accordion-content').forEach(acc => {
                            acc.classList.remove('open');
                            acc.previousElementSibling.querySelector('span:last-child').textContent = '+';
                        });
                        
                        content.classList.add('open');
                        icon.textContent = '−';
                    }
                });
            });
        }

        function copyCode() {
            const codeBlock = document.getElementById('codeBlock');
            navigator.clipboard.writeText(codeBlock.textContent).then(() => {
                // Show success message
                const button = event.target;
                const originalText = button.textContent;
                button.textContent = 'Copied!';
                button.classList.add('text-green-400');
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('text-green-400');
                }, 2000);
            });
        }

        function goBack() {
            window.close();
            // If window.close() doesn't work (some browsers block it), try to go back
            if (window.history.length > 1) {
                window.history.back();
            } else {
                // Fallback: redirect to the main analyzer
                window.location.href = 'stable-seo-analyzer.html';
            }
        }
    </script>
</body>
</html>

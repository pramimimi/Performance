<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Quintype Performance Analyser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .milk-button {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #1f2937;
            border: none;
            transition: all 0.3s ease;
        }
        .milk-button:hover {
            background: linear-gradient(135deg, #fde68a, #fcd34d);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .ai-glow {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }
        .progress-bar {
            background: linear-gradient(90deg, #ef4444, #f97316, #22c55e);
            height: 8px;
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }
        .code-block {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }
        .widget-solution {
            margin-top: 10px;
            padding: 10px;
            background: #f8fafc;
            border-left: 4px solid #3b82f6;
            border-radius: 4px;
        }
        .solution-header {
            font-weight: bold;
            color: #1e40af;
            margin-bottom: 8px;
        }
        .solution-code pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 6px;
            font-size: 11px;
            overflow-x: auto;
            margin: 0;
        }
        .widget-optimization-guide {
            margin-top: 20px;
            padding: 15px;
            background: #f0f9ff;
            border: 1px solid #0ea5e9;
            border-radius: 8px;
        }
        .optimization-code pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 6px;
            font-size: 10px;
            overflow-x: auto;
            margin: 0;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-800 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <div class="flex items-center justify-center mb-4">
                <svg class="w-12 h-12 mr-4 text-blue-400" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3z"/>
                </svg>
                <h1 class="text-5xl font-bold bg-gradient-to-r from-blue-400 to-white bg-clip-text text-transparent">
                    ⚡ Quintype Performance Analyser
                </h1>
            </div>
            <p class="text-blue-200 text-xl">AI-powered website performance analysis</p>
        </header>

        <!-- Analysis Section -->
        <section class="glass p-8 rounded-2xl shadow-2xl mb-6 ai-glow">
            <div class="text-center mb-6">
                <h2 class="text-4xl font-bold text-white mb-2">Performance Analysis</h2>
                <p class="text-blue-200 text-lg">Enter any website URL to get comprehensive performance insights</p>
            </div>
            
            <div class="flex gap-4 mb-6">
                <input 
                    type="url" 
                    id="urlInput" 
                    placeholder="https://example.com" 
                    class="flex-1 px-6 py-4 rounded-xl bg-white/10 border border-white/20 text-white placeholder-blue-200 focus:outline-none focus:ring-2 focus:ring-blue-400"
                >
                <button 
                    id="analyzeBtn"
                    onclick="analyze()" 
                    class="milk-button px-8 py-4 rounded-xl font-bold text-lg flex items-center gap-2"
                >
                    <span>⚡</span> Analyze Performance
                </button>
            </div>
            
            <div id="msg" class="text-center text-green-400 font-semibold mb-4"></div>
            <div id="progressContainer" class="hidden mb-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm text-blue-300">⚡ Analyzing website performance...</span>
                    <span id="progressPercent" class="text-sm text-blue-300">0%</span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-3 overflow-hidden">
                    <div id="progressBar" class="progress-bar h-full transition-all duration-300 ease-out"></div>
                </div>
                <div id="progressStatus" class="text-xs text-blue-200 mt-1">Initializing analysis...</div>
            </div>
        </section>

        <!-- Results Section -->
        <div id="result" class="hidden">
            <!-- Results will be populated here -->
        </div>
    </div>

    <script>
        let isAnalyzing = false;

        async function analyze() {
            if (isAnalyzing) return;
            
            const url = document.getElementById('urlInput').value.trim();
            const msg = document.getElementById('msg');
            const result = document.getElementById('result');
            const btn = document.getElementById('analyzeBtn');
            
            if (!url) {
                msg.textContent = 'Please enter a URL';
                return;
            }
            
            isAnalyzing = true;
            
            // Show progress bar and hide message
            msg.textContent = '';
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            const progressStatus = document.getElementById('progressStatus');
            
            progressContainer.classList.remove('hidden');
            btn.disabled = true;
            btn.textContent = '🔄 Analyzing...';
            
            // Start progress animation
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 15; // Random increment for realistic feel
                if (progress > 90) progress = 90; // Don't complete until actual response
                
                progressBar.style.width = progress + '%';
                progressPercent.textContent = Math.round(progress) + '%';
                
                // Update status messages
                if (progress < 20) {
                    progressStatus.textContent = 'Connecting to server...';
                } else if (progress < 40) {
                    progressStatus.textContent = 'Fetching page data...';
                } else if (progress < 60) {
                    progressStatus.textContent = 'Running performance tests...';
                } else if (progress < 80) {
                    progressStatus.textContent = 'Analyzing results...';
                } else {
                    progressStatus.textContent = 'Generating report...';
                }
            }, 200);
            
            try {
                console.log('Starting performance analysis for:', url);
                
                // Always use the backend server for API calls
                const response = await fetch('http://localhost:3000/analyze', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('Performance analysis completed:', data);
                
                // Complete progress bar
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                progressPercent.textContent = '100%';
                progressStatus.textContent = 'Analysis complete!';
                
                // Hide progress bar after a short delay
                setTimeout(() => {
                    progressContainer.classList.add('hidden');
                }, 1000);
                
                const issueCount = data.performance && data.performance.issues ? data.performance.issues.length : 0;
                msg.textContent = `✅ Analysis complete! Found ${issueCount} performance issues.`;
                displayResults(data);
                
            } catch (error) {
                console.error('Performance analysis failed:', error);
                
                // Clear progress bar on error
                clearInterval(progressInterval);
                progressContainer.classList.add('hidden');
                
                // Show a more helpful error message
                if (error.message.includes('Failed to fetch') || error.message.includes('CORS')) {
                    msg.textContent = '❌ Connection Error! Please start a web server.';
                    alert('❌ Connection Error!\n\nPlease make sure:\n1. The backend server is running on port 3000\n2. You are accessing the frontend through a web server (not file://)\n\nTo fix this, run: python -m http.server 8000 in the frontend folder\nThen open: http://localhost:8000/stable-seo-analyzer.html');
                } else {
                msg.textContent = `❌ Analysis failed: ${error.message}`;
                }
            } finally {
                isAnalyzing = false;
                btn.disabled = false;
                btn.innerHTML = '<span>⚡</span> Analyze Performance';
            }
        }

        // Global variable to store analysis data
        let currentAnalysisData = null;

        // Store analysis data when results are displayed
        function displayResults(data) {
            currentAnalysisData = data; // Store for detailed views
            const result = document.getElementById('result');
            result.className = 'block';
            
            // Ensure performance data exists
            const performance = data.performance || {
                overallScore: 0,
                lcp: 0,
                cls: 0,
                fcp: 0,
                tti: 0,
                tbt: 0,
                speedIndex: 0,
                issues: [],
                coreWebVitals: {
                    lcp: 'poor',
                    cls: 'poor',
                    fcp: 'poor'
                }
            };
            
            result.innerHTML = `
                <!-- Overall Performance Score -->
                <div class="text-center mb-8">
                    <div class="text-6xl font-bold text-white mb-2">${performance.overallScore}%</div>
                    <div class="text-blue-200 text-xl">Overall Performance Score</div>
                </div>

                <!-- Core Web Vitals -->
                <div class="glass p-8 rounded-2xl mb-8">
                    <h3 class="text-3xl font-bold text-white mb-6 flex items-center gap-2">
                        📊 Core Web Vitals
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                        <!-- LCP -->
                        <div class="bg-white/5 p-6 rounded-xl cursor-pointer hover:bg-white/10 transition-all duration-300" onclick="showMetricReport('lcp')">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-blue-200 font-semibold">LCP</span>
                                <span class="text-white font-bold">${formatMetricValue(performance.lcp, 'lcp')}</span>
                            </div>
                            <div class="w-full bg-gray-700 rounded-full h-2 mb-2">
                                <div class="progress-bar" style="width: ${Math.min(100, (4.0 - performance.lcp / 1000) / 4.0 * 100)}%"></div>
                            </div>
                            <div class="text-sm ${getVitalStatus(performance.coreWebVitals.lcp).color}">
                                ${getVitalStatus(performance.coreWebVitals.lcp).text}
                            </div>
                            <div class="text-xs text-gray-400 mt-1">Click for detailed report</div>
                        </div>

                        <!-- CLS -->
                        <div class="bg-white/5 p-6 rounded-xl cursor-pointer hover:bg-white/10 transition-all duration-300" onclick="showMetricReport('cls')">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-blue-200 font-semibold">CLS</span>
                                <span class="text-white font-bold">${formatMetricValue(performance.cls, 'cls')}</span>
                            </div>
                            <div class="w-full bg-gray-700 rounded-full h-2 mb-2">
                                <div class="progress-bar" style="width: ${Math.min(100, (0.25 - performance.cls) / 0.25 * 100)}%"></div>
                            </div>
                            <div class="text-sm ${getVitalStatus(performance.coreWebVitals.cls).color}">
                                ${getVitalStatus(performance.coreWebVitals.cls).text}
                            </div>
                            <div class="text-xs text-gray-400 mt-1">Click for detailed report</div>
                        </div>

                        <!-- FCP -->
                        <div class="bg-white/5 p-6 rounded-xl cursor-pointer hover:bg-white/10 transition-all duration-300" onclick="showMetricReport('fcp')">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-blue-200 font-semibold">FCP</span>
                                <span class="text-white font-bold">${formatMetricValue(performance.fcp, 'fcp')}</span>
                            </div>
                            <div class="w-full bg-gray-700 rounded-full h-2 mb-2">
                                <div class="progress-bar" style="width: ${Math.min(100, (3.0 - performance.fcp / 1000) / 3.0 * 100)}%"></div>
                            </div>
                            <div class="text-sm ${getVitalStatus(performance.coreWebVitals.fcp).color}">
                                ${getVitalStatus(performance.coreWebVitals.fcp).text}
                            </div>
                            <div class="text-xs text-gray-400 mt-1">Click for detailed report</div>
                        </div>

                        <!-- FID -->
                        <div class="bg-white/5 p-6 rounded-xl cursor-pointer hover:bg-white/10 transition-all duration-300" onclick="showMetricReport('fid')">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-blue-200 font-semibold">FID</span>
                                <span class="text-white font-bold">${formatMetricValue(performance.fid, 'fid')}</span>
                            </div>
                            <div class="w-full bg-gray-700 rounded-full h-2 mb-2">
                                <div class="progress-bar" style="width: ${Math.min(100, (300 - performance.fid) / 3)}%"></div>
                            </div>
                            <div class="text-sm ${getVitalStatus(performance.coreWebVitals.fid).color}">
                                ${getVitalStatus(performance.coreWebVitals.fid).text}
                            </div>
                            <div class="text-xs text-gray-400 mt-1">Click for detailed report</div>
                        </div>

                        <!-- INP -->
                        <div class="bg-white/5 p-6 rounded-xl cursor-pointer hover:bg-white/10 transition-all duration-300" onclick="showMetricReport('inp')">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-blue-200 font-semibold">INP</span>
                                <span class="text-white font-bold">${formatMetricValue(performance.inp, 'inp')}</span>
                            </div>
                        <div class="w-full bg-gray-700 rounded-full h-2 mb-2">
                                <div class="progress-bar" style="width: ${Math.min(100, (500 - performance.inp) / 5)}%"></div>
                            </div>
                            <div class="text-sm ${getVitalStatus(performance.coreWebVitals.inp).color}">
                                ${getVitalStatus(performance.coreWebVitals.inp).text}
                            </div>
                            <div class="text-xs text-gray-400 mt-1">Click for detailed report</div>
                        </div>
                    </div>
                </div>





                <!-- Performance Categories -->
                ${performance.categories ? `
                <div class="glass p-8 rounded-2xl mb-8">
                    <h3 class="text-3xl font-bold text-white mb-6 flex items-center gap-2">
                        🎯 Performance Categories
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="bg-white/5 p-6 rounded-xl text-center">
                            <div class="text-4xl font-bold text-white mb-2">${performance.categories.performance}%</div>
                        <div class="text-blue-200 mb-3">Performance</div>
                            <div class="w-full bg-gray-700 rounded-full h-2">
                                <div class="bg-blue-500 h-2 rounded-full" style="width: ${performance.categories.performance}%"></div>
                            </div>
                        </div>
                        <div class="bg-white/5 p-6 rounded-xl text-center">
                            <div class="text-4xl font-bold text-white mb-2">${performance.categories.accessibility}%</div>
                            <div class="text-blue-200 mb-3">Accessibility</div>
                            <div class="w-full bg-gray-700 rounded-full h-2">
                                <div class="bg-green-500 h-2 rounded-full" style="width: ${performance.categories.accessibility}%"></div>
                            </div>
                        </div>
                        <div class="bg-white/5 p-6 rounded-xl text-center">
                            <div class="text-4xl font-bold text-white mb-2">${performance.categories.bestPractices}%</div>
                            <div class="text-blue-200 mb-3">Best Practices</div>
                            <div class="w-full bg-gray-700 rounded-full h-2">
                                <div class="bg-yellow-500 h-2 rounded-full" style="width: ${performance.categories.bestPractices}%"></div>
                            </div>
                        </div>
                        <div class="bg-white/5 p-6 rounded-xl text-center">
                            <div class="text-4xl font-bold text-white mb-2">${performance.categories.seo}%</div>
                            <div class="text-blue-200 mb-3">SEO</div>
                            <div class="w-full bg-gray-700 rounded-full h-2">
                                <div class="bg-purple-500 h-2 rounded-full" style="width: ${performance.categories.seo}%"></div>
                            </div>
                        </div>
                    </div>
                </div>
                ` : ''}





                <!-- Optimization Opportunities -->
                ${performance.opportunities && performance.opportunities.length > 0 ? `
                <div class="glass p-8 rounded-2xl mb-8">
                    <h3 class="text-3xl font-bold text-white mb-6 flex items-center gap-2">
                        ⚡ Optimization Opportunities
                            </h3>
                    <div class="space-y-4">
                        ${performance.opportunities.map((opportunity, index) => `
                            <div class="bg-white/5 p-6 rounded-xl border border-yellow-500/20">
                                <div class="flex items-start justify-between">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-3 mb-2">
                                            <span class="px-3 py-1 rounded-full text-sm font-semibold bg-yellow-500/20 text-yellow-300 border border-yellow-500/30">
                                                ⚡ Opportunity
                                            </span>
                                            ${opportunity.savings ? `<span class="px-2 py-1 bg-green-500/20 text-green-300 text-xs rounded">${opportunity.savings}</span>` : ''}
                                        </div>
                                        <h4 class="text-xl font-semibold text-white mb-2">${opportunity.message}</h4>
                                        <p class="text-blue-200 mb-3">${opportunity.explanation}</p>
                                        <div class="bg-blue-900/20 border border-blue-500/30 p-4 rounded-lg mb-3">
                                            <div class="text-blue-200 font-semibold mb-1">💡 Impact:</div>
                                            <div class="text-blue-100">${opportunity.impact}</div>
                                        </div>
                                        <div class="bg-green-900/20 border border-green-500/30 p-4 rounded-lg mb-3">
                                            <div class="text-green-200 font-semibold mb-1">🔧 Fix:</div>
                                            <div class="text-green-100">${opportunity.fix}</div>
                                        </div>
                                        ${opportunity.code ? `
                                            <div class="code-block p-4 rounded-lg">
                                                <pre class="text-green-100 text-sm overflow-x-auto"><code>${opportunity.code}</code></pre>
                                            </div>
                                        ` : ''}
                                    </div>
                        </div>
                            </div>
                        `).join('')}
                            </div>
                        </div>
                ` : ''}

                <!-- Diagnostics -->
                ${performance.diagnostics && performance.diagnostics.length > 0 ? `
                <div class="glass p-8 rounded-2xl mb-8">
                    <h3 class="text-3xl font-bold text-white mb-6 flex items-center gap-2">
                        🔍 Diagnostics
                    </h3>
                    <div class="space-y-4">
                        ${performance.diagnostics.map((diagnostic, index) => `
                            <div class="bg-white/5 p-6 rounded-xl border border-blue-500/20">
                                <div class="flex items-start justify-between">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-3 mb-2">
                                            <span class="px-3 py-1 rounded-full text-sm font-semibold bg-blue-500/20 text-blue-300 border border-blue-500/30">
                                                ℹ️ ${getSeverityLevel(diagnostic.severity).label}
                                            </span>
                                        </div>
                                        <h4 class="text-xl font-semibold text-white mb-2">${diagnostic.message}</h4>
                                        <p class="text-blue-200 mb-3">${diagnostic.explanation}</p>
                                        <div class="bg-blue-900/20 border border-blue-500/30 p-4 rounded-lg mb-3">
                                            <div class="text-blue-200 font-semibold mb-1">💡 Impact:</div>
                                            <div class="text-blue-100">${diagnostic.impact}</div>
                                        </div>
                                        <div class="bg-green-900/20 border border-green-500/30 p-4 rounded-lg mb-3">
                                            <div class="text-green-200 font-semibold mb-1">🔧 Fix:</div>
                                            <div class="text-green-100">${diagnostic.fix}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}

                <!-- Source Code Analysis -->
                ${performance.pageSourceAnalysis && Object.keys(performance.pageSourceAnalysis).some(key => performance.pageSourceAnalysis[key].length > 0) ? `
                <div class="glass p-8 rounded-2xl mb-8">
                    <h3 class="text-3xl font-bold text-white mb-6 flex items-center gap-2">
                        🔍 Source Code Analysis
                            </h3>
                    
                    ${Object.entries(performance.pageSourceAnalysis).map(([metric, issues]) => {
                        if (!issues || !Array.isArray(issues) || issues.length === 0) return '';
                        
                        const metricNames = {
                            lcp: 'Largest Contentful Paint (LCP)',
                            cls: 'Cumulative Layout Shift (CLS)',
                            fcp: 'First Contentful Paint (FCP)',
                            tti: 'Time to Interactive (TTI)',
                            tbt: 'Total Blocking Time (TBT)',
                            general: 'General Source Code Issues'
                        };
                        
                        return `
                            <div class="mb-6">
                                <h4 class="text-xl font-semibold text-white mb-4 flex items-center gap-2">
                                    📊 ${metricNames[metric]}
                                    <span class="px-2 py-1 bg-orange-500/20 text-orange-300 text-xs rounded-full border border-orange-500/30">
                                        ${issues.length} issue${issues.length > 1 ? 's' : ''}
                                    </span>
                                </h4>
                        <div class="space-y-4">
                                    ${(issues || []).map((analysis, index) => `
                                        <div class="bg-orange-500/10 p-6 rounded-xl border border-orange-500/20">
                                    <div class="flex items-start justify-between">
                                        <div class="flex-1">
                                            <div class="flex items-center gap-3 mb-2">
                                                        <span class="px-3 py-1 rounded-full text-xs font-semibold bg-orange-500/20 text-orange-300 border border-orange-500/30">
                                                            Source Code
                                                        </span>
                                                        <span class="px-3 py-1 rounded-full text-xs font-semibold ${
                                                            analysis.severity === 'critical' 
                                                                ? 'bg-red-500/20 text-red-300 border border-red-500/30' 
                                                                : analysis.severity === 'warning' 
                                                                ? 'bg-yellow-500/20 text-yellow-300 border border-yellow-500/30'
                                                                : 'bg-green-500/20 text-green-300 border border-green-500/30'
                                                        }">
                                                            ${(analysis.severity || 'unknown').toUpperCase()}
                                                </span>
                                        </div>
                                                    <h5 class="text-lg font-semibold text-white mb-2">${analysis.message}</h5>
                                                    <p class="text-gray-300 mb-4">${analysis.explanation}</p>
                                                    
                                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        <div class="bg-white/5 p-4 rounded-lg">
                                                            <h6 class="font-semibold text-white mb-2">Source Code Issue</h6>
                                                            <p class="text-sm text-gray-300 mb-2">${analysis.sourceCodeIssue}</p>
                                                            <p class="text-xs text-gray-400">Location: ${analysis.exactLocation}</p>
                                                        </div>
                                                        
                                                        <div class="bg-white/5 p-4 rounded-lg">
                                                            <h6 class="font-semibold text-white mb-2">Solution</h6>
                                                            <p class="text-sm text-gray-300 mb-2">${analysis.fix}</p>
                                                        </div>
                                                    </div>
                                                    
                                                    <div class="mt-4 space-y-3">
                                                        <div class="bg-white/5 p-4 rounded-lg">
                                                            <h6 class="font-semibold text-white mb-2">Source Code Solution</h6>
                                                            <pre class="text-sm text-gray-300 bg-black/20 p-3 rounded overflow-x-auto"><code>${analysis.sourceCodeSolution}</code></pre>
                                                        </div>
                                                        
                                                        <div class="bg-white/5 p-4 rounded-lg">
                                                            <h6 class="font-semibold text-white mb-2">Publisher Custom Code Solution</h6>
                                                            <pre class="text-sm text-gray-300 bg-black/20 p-3 rounded overflow-x-auto"><code>${analysis.customCodeSolution}</code></pre>
                                                            <p class="text-xs text-gray-400 mt-2">${analysis.publisherImplementation}</p>
                                                        </div>
                                                    </div>
                                        </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
                ` : ''}
                
                <!-- Custom Code Analysis -->

                case 'good': return 'text-green-400';

                case 'poor': return 'text-red-400';

        // Format metric values for display (exact values like PageSpeed Insights)
        function formatMetricValue(value, metric) {
            if (metric === 'cls') {
                // Show CLS with up to 3 decimal places, but remove trailing zeros
                return parseFloat(value.toFixed(3)).toString();
            } else if (metric === 'lcp' || metric === 'fcp') {
                // Show LCP/FCP in seconds with 2 decimal places for precision
                return (value / 1000).toFixed(2) + ' s';
            } else if (metric === 'fid' || metric === 'inp') {
                // Show FID/INP in milliseconds with 1 decimal place for precision
                return value.toFixed(1) + ' ms';
            }
            return value;
        }
